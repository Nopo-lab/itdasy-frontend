<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 — 잇데이 스튜디오</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f9f5f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 24px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); padding: 36px 28px; max-width: 360px; width: 100%; text-align: center; }
  h2 { font-size: 20px; font-weight: 800; color: #1a0c10; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  input { width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 14px; margin-bottom: 12px; outline: none; }
  input:focus { border-color: #f18091; }
  .btn { width: 100%; padding: 16px; background: linear-gradient(135deg,#f18091,#ff9aa8); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; }
  .btn:disabled { background: #e0e0e0; cursor: not-allowed; }
  .msg { margin-top: 16px; font-size: 13px; padding: 12px; border-radius: 10px; display: none; }
  .msg.ok { background: #e8f5e9; color: #2e7d32; display: block; }
  .msg.err { background: #fce4ec; color: #c62828; display: block; }
</style>
</head>
<body>
<div class="card">
  <h2>비밀번호 재설정</h2>
  <p class="sub">새 비밀번호를 입력해주세요.</p>
  <input type="password" id="pw1" placeholder="새 비밀번호 (8자 이상, 영문+숫자)">
  <input type="password" id="pw2" placeholder="비밀번호 확인">
  <button class="btn" onclick="doReset()">비밀번호 변경</button>
  <div class="msg" id="msg"></div>
</div>
<script>
const API = 'https://itdasy260417-production.up.railway.app';
const token = new URLSearchParams(location.search).get('token');

if (!token) {
  document.querySelector('.card').innerHTML = '<h2>잘못된 접근</h2><p class="sub">유효하지 않은 링크입니다.</p>';
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');

  if (pw1 !== pw2) { msg.className = 'msg err'; msg.textContent = '비밀번호가 일치하지 않습니다.'; return; }
  if (pw1.length < 8) { msg.className = 'msg err'; msg.textContent = '8자 이상 입력해주세요.'; return; }

  try {
    const r = await fetch(API + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw1 })
    });
    const d = await r.json();
    if (r.ok) {
      msg.className = 'msg ok';
      msg.textContent = d.message + ' 3초 후 로그인 페이지로 이동합니다.';
      setTimeout(() => location.href = 'https://nopo-lab.github.io/itdasy-frontend/', 3000);
    } else {
      msg.className = 'msg err';
      msg.textContent = d.detail || '재설정 실패';
    }
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = '서버 연결 실패';
  }
}
</script>
</body>
</html>
